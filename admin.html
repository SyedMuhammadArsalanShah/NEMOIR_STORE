<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEMOIR | Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0a0f0b] text-white min-h-screen flex items-center justify-center p-6 font-sans">

    <div id="auth" class="w-full max-w-md bg-white/5 backdrop-blur-2xl p-12 rounded-[3rem] border border-white/10">
        <h2 class="text-2xl italic tracking-widest mb-8 text-center">N E M O I R</h2>
        <input type="email" id="e" placeholder="Email" class="w-full p-4 mb-4 bg-white/5 rounded-2xl outline-none border border-white/10 text-sm">
        <input type="password" id="p" placeholder="Access Key" class="w-full p-4 mb-8 bg-white/5 rounded-2xl outline-none border border-white/10 text-sm">
        <button onclick="login()" class="w-full bg-emerald-600 py-4 rounded-2xl font-bold uppercase text-[10px]">Login</button>
    </div>

    <div id="dash" class="hidden w-full max-w-5xl">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-3xl italic">Inventory Manager</h1>
            <button onclick="location.reload()" class="text-[10px] opacity-50 uppercase tracking-widest">Logout</button>
        </div>
        
        <div class="grid md:grid-cols-2 gap-10">
            <div class="space-y-4 bg-white/5 p-8 rounded-[2rem] border border-white/5">
                <input type="text" id="n" placeholder="Product Name" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl outline-none">
                <input type="text" id="pr" placeholder="Price (PKR)" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl outline-none">
                <input type="text" id="im" placeholder="Image URL" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl outline-none">
                
                <select id="cat" class="w-full p-4 bg-white/10 border border-white/10 rounded-xl outline-none text-emerald-400 font-bold uppercase text-xs">
                    <option value="organic">Organic Product</option>
                    <option value="garments">Garments</option>
                </select>

                <textarea id="de" placeholder="Description" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl h-24 outline-none"></textarea>
                <button onclick="add()" class="w-full bg-white text-black py-4 rounded-xl font-bold text-xs uppercase hover:bg-emerald-500 hover:text-white transition-all">Add to Queue</button>
            </div>

            <div class="bg-emerald-950/30 p-10 rounded-[2rem] border border-emerald-500/20 flex flex-col justify-center items-center text-center">
                <h3 class="text-[10px] uppercase tracking-[0.5em] mb-4 opacity-50">Pending Updates</h3>
                <div id="count" class="text-6xl font-light italic mb-8">0</div>
                <div class="flex flex-col gap-3 w-full">
                    <button onclick="exportData('json')" class="bg-emerald-600 p-4 rounded-xl text-[10px] font-bold uppercase tracking-widest">Download products.json</button>
                    <button onclick="exportData('csv')" class="border border-emerald-500/30 p-4 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-emerald-600/20 transition-all">Download products.csv</button>
                </div>
                <p class="text-[9px] mt-10 text-emerald-500/50 uppercase italic">Upload the downloaded file to your 'data' folder to go live.</p>
            </div>
        </div>
    </div>

    <script>
        let db = [];
        function login() {
            if(document.getElementById('e').value === 'malaikayaseen13@gmail.com' && document.getElementById('p').value === 'Malaika-13') {
                document.getElementById('auth').style.display = 'none';
                document.getElementById('dash').classList.remove('hidden');
            } else { alert("Access Denied"); }
        }

        function add() {
            const name = document.getElementById('n').value;
            if(!name) return alert("Please enter name");
            
            db.push({
                "name": name,
                "price": document.getElementById('pr').value,
                "img": document.getElementById('im').value,
                "desc": document.getElementById('de').value,
                "category": document.getElementById('cat').value,
                "size": "Premium"
            });
            document.getElementById('count').innerText = db.length;
            // Clear inputs
            document.getElementById('n').value = '';
            document.getElementById('pr').value = '';
            alert("Added Successfully!");
        }

        function exportData(type) {
            if(db.length === 0) return alert("Queue is empty!");
            let content, mime, name;
            if(type === 'json') {
                content = JSON.stringify(db, null, 2);
                mime = 'application/json';
                name = 'products.json';
            } else {
                const header = "name,price,img,desc,category,size\n";
                const rows = db.map(i => `"${i.name}","${i.price}","${i.img}","${i.desc}","${i.category}","${i.size}"`).join("\n");
                content = header + rows;
                mime = 'text/csv';
                name = 'products.csv';
            }
            const blob = new Blob([content], { type: mime });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = name; a.click();
        }
    </script>
</body>
</html>
