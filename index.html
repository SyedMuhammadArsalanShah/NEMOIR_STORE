<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N E M O I R | Future of Organic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #2d5a27; --bg: #f8f9fa; }
        body { font-family: 'Space Grotesk', sans-serif; background-color: var(--bg); color: #1a1a1a; overflow-x: hidden; }
        .serif { font-family: 'Playfair Display', serif; }
        
        .bento-card {
            background: white;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(0,0,0,0.01);
        }
        .bento-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 40px 80px rgba(0,0,0,0.06);
            border-color: var(--accent);
        }

        .bg-text {
            position: absolute;
            font-size: 20vw;
            font-weight: 900;
            color: rgba(45, 90, 39, 0.03);
            z-index: -1;
            white-space: nowrap;
            pointer-events: none;
        }

        .tab-btn.active {
            background-color: #1a1a1a;
            color: white;
            border-color: #1a1a1a;
        }
        
        #product-grid { transition: opacity 0.4s ease-in-out; }
    </style>
</head>
<body class="antialiased">

    <div class="bg-text serif">NEMOIR</div>

    <nav class="fixed w-full z-50 mix-blend-difference px-6 py-4 flex justify-between items-center text-white">
        <div class="flex items-center gap-3">
            <img src="images/p1.jpeg" alt="Logo" class="h-10 w-auto">
            <h1 class="text-xl font-bold tracking-tighter italic">NEMOIR</h1>
        </div>
        <div class="flex gap-8 text-[10px] uppercase tracking-[0.4em]">
            <a href="#shop" class="hover:opacity-50 transition">Shop</a>
            <a href="https://wa.me/923259220543" class="hover:opacity-50 transition">Contact</a>
        </div>
    </nav>

    <section class="min-h-screen flex flex-col justify-center px-6 md:px-20 relative overflow-hidden">
        <div class="max-w-4xl z-10">
            <h2 class="serif text-[12vw] md:text-[8vw] leading-[0.9] mb-10 tracking-tighter">
                Organic <br> <span class="text-[#2d5a27] italic">Redefined.</span>
            </h2>
            <div class="flex flex-col md:flex-row items-start md:items-center gap-8">
                <p class="max-w-sm text-lg text-stone-500 font-light leading-relaxed">
                    A modern apothecary for the conscious era. Pure ingredients, premium aesthetics.
                </p>
                <a href="#shop" class="bg-[#1a1a1a] text-white px-10 py-6 rounded-full text-xs font-bold uppercase tracking-widest hover:bg-[#2d5a27] transition-all">
                    Explore Inventory
                </a>
            </div>
        </div>
        
        <div class="absolute right-[-10%] top-[10%] w-[50vw] h-[80vh] rounded-[4rem] overflow-hidden rotate-[-2deg] z-0 opacity-80 shadow-2xl hidden md:block">
            <img src="images/p2.jpeg" class="w-full h-full object-cover">
        </div>
    </section>

    <section id="shop" class="px-6 md:px-20 py-32 bg-white">
        <div class="mb-16">
            <span class="text-[10px] font-bold uppercase tracking-[0.5em] text-[#2d5a27]">Collection 2026</span>
            <h3 class="serif text-6xl mt-4 tracking-tighter">Inventory</h3>
            
            <div class="flex gap-4 mt-10">
                <button onclick="filterItems('organic')" id="tab-organic" class="tab-btn active border border-stone-200 px-8 py-3 rounded-full text-[10px] font-bold uppercase tracking-widest transition-all">
                    Organic Products
                </button>
                <button onclick="filterItems('garments')" id="tab-garments" class="tab-btn border border-stone-200 px-8 py-3 rounded-full text-[10px] font-bold uppercase tracking-widest transition-all">
                    Garments
                </button>
            </div>
        </div>

        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
        
        <div id="loader" class="text-center py-20 font-mono text-xs uppercase opacity-40">Loading Essentials...</div>
    </section>

    <footer class="py-20 px-6 border-t border-stone-100 text-center">
        <p class="text-[10px] font-bold uppercase tracking-[1em] opacity-20">N E M O I R • M A L A I K A</p>
    </footer>

    <script>
        let masterData = [];

        async function loadData() {
            try {
                const response = await fetch('data/products.json');
                if (response.ok) {
                    masterData = await response.json();
                } else {
                    const csvRes = await fetch('data/products.csv');
                    const text = await csvRes.text();
                    Papa.parse(text, { header: true, complete: (r) => { masterData = r.data; filterItems('organic'); } });
                    return;
                }
                filterItems('organic');
            } catch (e) { console.error(e); }
        }

        function filterItems(cat) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + cat).classList.add('active');
            
            const filtered = masterData.filter(i => (i.category || '').toLowerCase() === cat.toLowerCase());
            render(filtered);
        }

        function render(items) {
            const grid = document.getElementById('product-grid');
            const loader = document.getElementById('loader');
            grid.style.opacity = '0';
            
            setTimeout(() => {
                grid.innerHTML = items.map(item => `
                    <div class="bento-card rounded-[3rem] p-8 flex flex-col justify-between border border-stone-100">
                        <div>
                            <div class="rounded-[2.5rem] overflow-hidden aspect-square mb-8 bg-stone-50">
                                <img src="${item.img || item.Images}" class="w-full h-full object-cover hover:scale-105 transition-transform duration-700">
                            </div>
                            <h4 class="serif text-2xl mb-2 tracking-tighter">${item.name || item['Item Name']}</h4>
                            <p class="text-xs text-stone-400 mb-6 font-light line-clamp-2">${item.desc || item.Desc}</p>
                        </div>
                        <div class="flex justify-between items-center pt-4 border-t border-stone-50">
                            <span class="text-xl font-bold tracking-tighter">Rs. ${item.price || item.Price}</span>
                            <button onclick="orderWA('${item.name || item['Item Name']}', '${item.price || item.Price}')" 
                                class="bg-stone-900 text-white px-6 py-3 rounded-full text-[9px] font-bold uppercase tracking-widest hover:bg-[#2d5a27] transition-all">
                                Order
                            </button>
                        </div>
                    </div>
                `).join('');
                grid.style.opacity = '1';
                loader.style.display = 'none';
            }, 300);
        }

        function orderWA(n, p) {
            window.open(`https://wa.me/923259220543?text=I am interested in: ${n} (Rs.${p})`, '_blank');
        }

        window.onload = loadData;
    </script>
</body>
</html>
