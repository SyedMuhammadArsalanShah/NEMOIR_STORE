<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N E M O I R | Future of Organic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #2d5a27; --bg: #f8f9fa; }
        body { font-family: 'Space Grotesk', sans-serif; background-color: var(--bg); color: #1a1a1a; overflow-x: hidden; }
        .serif { font-family: 'Playfair Display', serif; }
        
        /* Modern Bento Hover Effect */
        .bento-card {
            background: white;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(0,0,0,0.03);
        }
        .bento-card:hover {
            transform: scale(1.02) translateY(-5px);
            box-shadow: 0 40px 80px rgba(0,0,0,0.08);
            border-color: var(--accent);
        }

        /* Animated Background Text */
        .bg-text {
            position: absolute;
            font-size: 20vw;
            font-weight: 900;
            color: rgba(45, 90, 39, 0.03);
            z-index: -1;
            white-space: nowrap;
            pointer-events: none;
        }

        .custom-cursor {
            mix-blend-mode: difference;
        }
    </style>
</head>
<body class="antialiased">

    <div class="bg-text serif">NEMOIR</div>

    <nav class="fixed w-full z-50 mix-blend-difference px-6 py-8 flex justify-between items-center text-white">
        <h1 class="text-2xl font-bold tracking-tighter italic">N.</h1>
        <div class="flex gap-8 text-[10px] uppercase tracking-[0.4em]">
            <a href="#shop" class="hover:opacity-50 transition">Shop</a>
            <a href="https://wa.me/923259220543" class="hover:opacity-50 transition">Contact</a>
        </div>
    </nav>

    <section class="min-h-screen flex flex-col justify-center px-6 md:px-20 relative overflow-hidden">
        <div class="max-w-5xl">
            <h2 class="serif text-[12vw] md:text-[8vw] leading-[0.9] mb-10 tracking-tighter">
                Organic <br> <span class="text-[#2d5a27] italic">Redefined.</span>
            </h2>
            <div class="flex flex-col md:flex-row items-start md:items-center gap-8">
                <p class="max-w-sm text-lg text-stone-500 font-light leading-relaxed">
                    A modern apothecary for the conscious era. We blend ancient herbal wisdom with 2026 aesthetics.
                </p>
                <a href="#shop" class="bg-[#1a1a1a] text-white px-10 py-6 rounded-full text-xs font-bold uppercase tracking-widest hover:bg-[#2d5a27] transition-colors duration-500">
                    Explore Inventory
                </a>
            </div>
        </div>
        
        <div class="hidden md:block absolute right-[-5%] top-[20%] w-[40vw] h-[60vh] rounded-[4rem] overflow-hidden rotate-[-5deg] z-[-1] opacity-90 shadow-2xl">
            <img src="https://images.unsplash.com/photo-1540555700478-4be289fbecef?q=80&w=2000" class="w-full h-full object-cover">
        </div>
    </section>

    <section id="shop" class="px-6 md:px-20 py-32 bg-white">
        <div class="flex flex-col md:flex-row justify-between items-end mb-20 gap-6">
            <div>
                <span class="text-[10px] font-bold uppercase tracking-[0.5em] text-[#2d5a27]">Collection 2026</span>
                <h3 class="serif text-6xl mt-4 tracking-tighter">The Essentials</h3>
            </div>
            <div id="loader" class="text-xs font-mono uppercase opacity-30 italic">Syncing DB...</div>
        </div>

        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 opacity-0 transition-all duration-1000 translate-y-10">
            </div>
    </section>

    <footer class="py-20 px-6 border-t border-stone-100 text-center">
        <p class="text-[10px] font-bold uppercase tracking-[1em] opacity-20">N E M O I R • M A L A I K A</p>
    </footer>

    <script>
        async function fetchProducts() {
            try {
                let response = await fetch('data/products.json');
                if (response.ok) {
                    const data = await response.json();
                    renderItems(data);
                } else {
                    let csvResponse = await fetch('data/products.csv');
                    if (csvResponse.ok) {
                        const csvText = await csvResponse.text();
                        Papa.parse(csvText, {
                            header: true,
                            skipEmptyLines: true,
                            complete: (results) => renderItems(results.data)
                        });
                    }
                }
            } catch (err) { console.error("DB Error", err); }
        }

        function renderItems(items) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            items.forEach((item, index) => {
                const isLarge = index % 3 === 0; // Create some variation in sizes
                grid.innerHTML += `
                    <div class="bento-card rounded-[3rem] p-8 flex flex-col justify-between">
                        <div>
                            <div class="rounded-[2.5rem] overflow-hidden aspect-square mb-8">
                                <img src="${item.img || item.Images}" class="w-full h-full object-cover hover:scale-110 transition-transform duration-700">
                            </div>
                            <h4 class="serif text-3xl mb-2 tracking-tighter">${item.name || item['Item Name']}</h4>
                            <p class="text-xs text-stone-400 mb-6 font-light">${item.desc || item.Desc}</p>
                        </div>
                        <div class="flex justify-between items-center pt-4">
                            <span class="text-2xl font-bold tracking-tighter">Rs. ${item.price || item.Price}</span>
                            <button onclick="orderWA('${item.name || item['Item Name']}', '${item.price || item.Price}')" 
                                class="bg-stone-100 text-stone-900 px-6 py-3 rounded-full text-[10px] font-bold uppercase tracking-widest hover:bg-[#2d5a27] hover:text-white transition-all">
                                WhatsApp Order
                            </button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('loader').style.display = 'none';
            grid.classList.remove('opacity-0', 'translate-y-10');
        }

        function orderWA(n, p) {
            window.open(`https://wa.me/923259220543?text=${encodeURIComponent('I am interested in: ' + n + ' (Rs.' + p + ')')}`, '_blank');
        }
        window.onload = fetchProducts;
    </script>
</body>
</html>
